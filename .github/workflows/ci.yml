name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # package-lock.json is gitignored in this repo, so use `npm install` (not `npm ci`)
      # and skip setup-node's npm cache (it requires a committed lockfile).
      - run: npm install
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Bundle size budget
        run: npm run size
